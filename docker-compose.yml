services:
  # PostgreSQL Database
  postgres:
    image: postgres:alpine3.22
    container_name: bulkmail-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bulkmail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bulkmail123}
      POSTGRES_DB: ${POSTGRES_DB:-bulkmail}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - bulkmail-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bulkmail}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for Queue
  redis:
    image: redis:8.4.2-alpine
    container_name: bulkmail-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bulkmail-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bulkmail-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-3000}
      UPLOAD_DIR: /app/uploads
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-bulkmail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bulkmail123}
      POSTGRES_DB: ${POSTGRES_DB:-bulkmail}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SMTP_HOST: ${SMTP_HOST:-smtp.mailtrap.io}
      SMTP_PORT: ${SMTP_PORT:-2525}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_SENDER: ${SMTP_SENDER:-noreply@bulkmail.com}
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads:rw
    networks:
      - bulkmail-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm run migrate && npm run dev"

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bulkmail-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    ports:
      - "5173:80"
    networks:
      - bulkmail-network
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # Worker for email processing
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bulkmail-worker
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-bulkmail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bulkmail123}
      POSTGRES_DB: ${POSTGRES_DB:-bulkmail}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SMTP_HOST: ${SMTP_HOST:-smtp.mailtrap.io}
      SMTP_PORT: ${SMTP_PORT:-2525}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_SENDER: ${SMTP_SENDER:-noreply@bulkmail.com}
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads:rw
    networks:
      - bulkmail-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm run worker"

networks:
  bulkmail-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads:
